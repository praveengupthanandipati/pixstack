<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/fav.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pixstack</title>
    <style>
      #page-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: #ffffff;
        transition: opacity 0.45s ease;
      }
      #page-loader.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .pl-brand {
        font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 1.75rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #242424;
        line-height: 1;
      }
      .pl-brand span { color: #E42929; }
      .pl-spinner {
        position: relative;
        width: 44px;
        height: 44px;
      }
      .pl-spinner::before,
      .pl-spinner::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
      }
      .pl-spinner::before {
        border-top-color: #E42929;
        animation: pl-spin 0.8s linear infinite;
      }
      .pl-spinner::after {
        border-bottom-color: #f0efef;
        animation: pl-spin 0.8s linear infinite reverse;
      }
      @keyframes pl-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="page-loader">
      <div class="pl-brand">PIX<span>STACK</span></div>
      <div class="pl-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
